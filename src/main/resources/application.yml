# Server Configuration
server:
  port: 8080
  servlet:
    context-path: ""

spring:
  application:
    name: petsignal-be
  
  # Database Configuration
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # Jackson Configuration
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
  
  # Spring DevTools Configuration
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
      exclude: WEB-INF/**

  # Email configuration for Spring Boot AutoConfiguration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_ADDRESS}
    password: ${APP_EMAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000
      mail.smtp.starttls.enable: true
    # test-connection: true # This is not a standard Spring Boot property, consider removing or handling differently

petsignal:
  jwt:
    secret: ${JWT_SECRET_KEY}
    expiration: ${JWT_EXPIRATION_MS}

# OpenAPI Configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /openapi.yaml
  show-actuator: false

# AWS Configuration
aws:
  access-key-id: ${AWS_ACCESS_KEY_ID}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY}
  s3:
    region: ${AWS_REGION:us-east-1}
    bucket-name: ${AWS_S3_BUCKET_NAME}

# Scheduled jobs configuration
scheduling:
  delete-photos:
    cron: "0 0 3 * * *"

# email notification settings
notifications:
  email:
    from: ${FROM_EMAIL_ADDRESS}

# Logging configuration for Hibernate SQL and parameters
logging:
  level:
    org.hibernate.SQL: DEBUG # Muestra las sentencias SQL generadas
    org.hibernate.type.descriptor.sql: TRACE # Muestra los parámetros bindeados a las sentencias SQL